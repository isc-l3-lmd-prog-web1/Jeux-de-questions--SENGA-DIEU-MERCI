<p id="best">0</p>

<button class="btn" onclick="reset()">Réinitialiser</button>

</div>

</div>

<script>
let s=localStorage.getItem("scoreWordPlay");

if(s){
    document.getElementById("best").innerText=s;
}else{
    document.getElementById("best").innerText="0";
}

function reset(){
    localStorage.removeItem("scoreWordPlay");
    document.getElementById("best").innerText="0";
}
</script>
